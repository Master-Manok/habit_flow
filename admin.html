<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HabitFlow — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #0f1117;
  --ink2:   #3d4152;
  --ink3:   #8a8fa8;
  --mist:   #f4f3ef;
  --cream:  #faf9f6;
  --accent: #2b5ce6;
  --danger: #dc2626;
  --border: rgba(0,0,0,.09);
  --card:   #ffffff;
  --radius: 12px;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;
}

html, body { min-height: 100%; background: var(--cream); font-family: var(--font-sans); color: var(--ink); }

body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse 50% 40% at 80% 20%, #d9e8ff 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

.page { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:2rem 1.5rem 4rem; }

.topbar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:2rem;
}

.back-link {
  display:flex; align-items:center; gap:6px;
  font-size:.85rem; color:var(--ink3);
  text-decoration:none;
  transition:color .15s;
}
.back-link:hover { color:var(--accent); }

.page-heading {
  font-family:var(--font-serif);
  font-size:2rem; color:var(--ink);
  margin-bottom:.25rem;
}
.page-sub { font-size:.88rem; color:var(--ink3); margin-bottom:2rem; }

/* ── CARD ── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:1.5rem;
}

.card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.9rem 1.25rem;
  border-bottom:1px solid var(--border);
  background:var(--mist);
}

.card-title { font-size:.9rem; font-weight:500; color:var(--ink); display:flex; align-items:center; gap:6px; }
.card-body  { padding:1.25rem; }

/* ── INVITE FORM ── */
.invite-form { display:flex; gap:10px; flex-wrap:wrap; }

.invite-form input {
  flex:1; min-width:200px;
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font:400 .9rem var(--font-sans);
  background:var(--mist); color:var(--ink);
  outline:none;
  transition:border-color .2s;
}
.invite-form input:focus { border-color:var(--accent); background:#fff; }

.btn {
  padding:10px 20px;
  border-radius:8px; border:none;
  font:500 .88rem var(--font-sans);
  cursor:pointer; transition:opacity .15s;
}
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { opacity:.88; }
.btn-accent:disabled { opacity:.5; cursor:not-allowed; }
.btn-ghost { background:var(--mist); color:var(--ink2); border:1px solid var(--border); }
.btn-ghost:hover { background:#eee; }
.btn-danger { background:#fee2e2; color:var(--danger); border:1px solid #fca5a5; }
.btn-danger:hover { background:#fecaca; }

/* ── MEMBERS TABLE ── */
table.members {
  width:100%; border-collapse:collapse;
}

table.members th, table.members td {
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  font-size:.85rem;
  text-align:left;
}
table.members th { color:var(--ink3); font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; font-weight:500; background:var(--mist); }
table.members tr:last-child td { border-bottom:none; }
table.members tr:hover td { background:rgba(0,0,0,.015); }

.member-avatar {
  width:30px; height:30px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:500;
  vertical-align:middle; margin-right:8px;
}

.role-badge {
  display:inline-flex; align-items:center;
  padding:3px 8px; border-radius:5px;
  font-size:.72rem; font-weight:500;
}
.role-badge.admin  { background:#dce9ff; color:var(--accent); }
.role-badge.member { background:var(--mist); color:var(--ink3); }

.action-cell { display:flex; gap:6px; align-items:center; }
.action-btn {
  padding:5px 10px; border-radius:6px; border:none;
  font:400 .75rem var(--font-sans); cursor:pointer;
  transition:all .15s;
}
.action-btn.promote { background:#dce9ff; color:var(--accent); }
.action-btn.promote:hover { background:#b8d0ff; }
.action-btn.demote  { background:var(--mist); color:var(--ink3); }
.action-btn.demote:hover  { background:#e0e0e0; }
.action-btn.remove  { background:#fee2e2; color:var(--danger); }
.action-btn.remove:hover  { background:#fecaca; }

/* ── ALERT ── */
.alert {
  padding:10px 14px; border-radius:8px;
  font-size:.85rem; margin-bottom:1rem;
  display:none;
}
.alert.success { background:#d1fae5; color:#065f46; display:block; }
.alert.error   { background:#fee2e2; color:#991b1b; display:block; }

/* ── LOADER ── */
.loader { display:flex; align-items:center; gap:8px; color:var(--ink3); font-size:.85rem; padding:1rem 0; }
.spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:1.5rem; right:1.5rem;
  background:var(--ink); color:#fff;
  padding:10px 18px; border-radius:10px;
  font-size:.85rem; z-index:300;
  transform:translateY(60px); opacity:0;
  transition:all .3s; pointer-events:none;
}
.toast.show { transform:none; opacity:1; }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <a href="app.html" class="back-link">← Back to app</a>
    <span style="font-size:.8rem;color:var(--ink3)" id="adminBadge"></span>
  </div>

  <h1 class="page-heading">Admin Panel</h1>
  <p class="page-sub">Manage members and send invitations. Only admins can access this page.</p>

  <!-- Invite new user -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">✉️ Invite member</span>
    </div>
    <div class="card-body">
      <div id="inviteAlert" class="alert"></div>
      <div class="invite-form">
        <input type="text"  id="inviteName"  placeholder="Display name (e.g. Alice)" />
        <input type="email" id="inviteEmail" placeholder="Email address" />
        <button class="btn btn-accent" id="inviteBtn" onclick="inviteUser()">Send invite</button>
      </div>
      <p style="font-size:.78rem;color:var(--ink3);margin-top:.75rem">
        The user will receive a magic-link email to join HabitFlow. They will be added as a <strong>Member</strong> by default.
      </p>
    </div>
  </div>

  <!-- Members list -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">👥 Members</span>
      <span id="memberCount" style="font-size:.78rem;color:var(--ink3)"></span>
    </div>
    <div id="membersBody">
      <div class="card-body"><div class="loader"><div class="spinner"></div> Loading members…</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const USER_COLORS = ["#2b5ce6","#059669","#7c3aed","#d97706","#0891b2","#dc2626","#db2777","#65a30d"];
const USER_FILLS  = ["#dce9ff","#d1fae5","#ede9fe","#fef3c7","#e0f2fe","#fee2e2","#fce7f3","#ecfccb"];

let currentAdminId = null;

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }

  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (!profile || profile.role !== 'admin') {
    document.querySelector('.page').innerHTML = `<div style="text-align:center;padding:4rem;color:var(--ink3)">
      <div style="font-size:2rem;margin-bottom:1rem">🔒</div>
      <div>Access denied. Admin only.</div>
      <a href="app.html" style="display:inline-block;margin-top:1rem;color:var(--accent)">← Go back</a>
    </div>`;
    return;
  }

  currentAdminId = user.id;
  document.getElementById('adminBadge').textContent = `Signed in as ${profile.display_name || profile.email}`;
  loadMembers();
}

async function loadMembers() {
  const { data: members, error } = await sb.from('profiles').select('*').order('created_at');
  if (error) { document.getElementById('membersBody').innerHTML = `<div class="card-body" style="color:var(--danger)">Failed to load members.</div>`; return; }

  document.getElementById('memberCount').textContent = `${members.length} member${members.length !== 1 ? 's' : ''}`;

  if (members.length === 0) {
    document.getElementById('membersBody').innerHTML = `<div class="card-body" style="color:var(--ink3)">No members yet.</div>`;
    return;
  }

  let html = `<table class="members">
    <thead><tr>
      <th>Member</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th>
    </tr></thead><tbody>`;

  members.forEach((m, i) => {
    const color = USER_COLORS[i % USER_COLORS.length];
    const fill  = USER_FILLS[i % USER_FILLS.length];
    const isAdmin = m.role === 'admin';
    const isSelf  = m.id === currentAdminId;
    const joined  = new Date(m.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

    html += `<tr>
      <td>
        <span class="member-avatar" style="background:${fill};color:${color}">${(m.display_name||m.email).slice(0,2).toUpperCase()}</span>
        ${escHtml(m.display_name || '—')}
        ${isSelf ? '<span style="font-size:.7rem;color:var(--ink3);margin-left:4px">(you)</span>' : ''}
      </td>
      <td style="color:var(--ink3)">${escHtml(m.email)}</td>
      <td><span class="role-badge ${m.role}">${m.role}</span></td>
      <td style="color:var(--ink3)">${joined}</td>
      <td>
        <div class="action-cell">
          ${!isSelf && !isAdmin ? `<button class="action-btn promote" onclick="changeRole('${m.id}','admin')">Make admin</button>` : ''}
          ${!isSelf && isAdmin  ? `<button class="action-btn demote"  onclick="changeRole('${m.id}','member')">Demote</button>` : ''}
          ${!isSelf ? `<button class="action-btn remove" onclick="removeMember('${m.id}', '${escAttr(m.display_name||m.email)}')">Remove</button>` : ''}
        </div>
      </td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('membersBody').innerHTML = html;
}

async function inviteUser() {
  const name  = document.getElementById('inviteName').value.trim();
  const email = document.getElementById('inviteEmail').value.trim();
  if (!email) { showInviteAlert('Please enter an email address.', 'error'); return; }

  const btn = document.getElementById('inviteBtn');
  btn.disabled = true; btn.textContent = 'Sending…';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: 'https://master-manok.github.io/habit_flow/app.html',
      data: { display_name: name || email.split('@')[0] }
    }
  });

  btn.disabled = false; btn.textContent = 'Send invite';

  if (error) {
    showInviteAlert(error.message, 'error');
  } else {
    document.getElementById('inviteName').value  = '';
    document.getElementById('inviteEmail').value = '';
    showInviteAlert(`Invite sent to ${email}!`, 'success');
    showToast('Invitation sent ✓');
  }
}

async function changeRole(userId, newRole) {
  const { error } = await sb.from('profiles').update({ role: newRole }).eq('id', userId);
  if (error) { showToast('Failed to update role.'); return; }
  showToast(`Role updated to ${newRole}.`);
  loadMembers();
}

async function removeMember(userId, name) {
  if (!confirm(`Remove ${name} from HabitFlow? Their habit data will also be deleted.`)) return;

  // Delete from profiles (cascade deletes habits + logs via FK)
  const { error } = await sb.from('profiles').delete().eq('id', userId);
  if (error) { showToast('Failed to remove member.'); return; }

  showToast(`${name} removed.`);
  loadMembers();
}

function showInviteAlert(msg, type) {
  const el = document.getElementById('inviteAlert');
  el.textContent = msg;
  el.className = 'alert ' + type;
  setTimeout(() => { el.className = 'alert'; }, 5000);
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'"); }

init();
</script>
</body>
</html>
