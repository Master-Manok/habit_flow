<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HabitFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #0f1117;
  --ink2:    #3d4152;
  --ink3:    #8a8fa8;
  --mist:    #f4f3ef;
  --cream:   #faf9f6;
  --accent:  #2b5ce6;
  --danger:  #dc2626;
  --done-bg: #c7dcff;
  --skip-bg: #ffd6d6;
  --wknd-bg: #e8f0fe;
  --border:  rgba(0,0,0,.09);
  --card:    #ffffff;
  --radius:  12px;
  --sidebar: 220px;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;
}

html, body { height: 100%; background: var(--cream); font-family: var(--font-sans); color: var(--ink); }

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  background: var(--ink);
  color: #fff;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 10;
  padding: 0;
  transition: transform .25s;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 1.5rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,.08);
  font-size: .95rem; font-weight: 500;
  letter-spacing: -.01em;
  color: #fff;
}

.logo-box {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.sidebar-section-label {
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: rgba(255,255,255,.3);
  padding: 1.25rem 1.25rem .4rem;
}

.user-nav { flex: 1; overflow-y: auto; padding-bottom: 1rem; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 1.25rem;
  cursor: pointer;
  transition: background .15s;
  font-size: .88rem;
  color: rgba(255,255,255,.7);
  border-radius: 0;
  position: relative;
}

.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }

.nav-item.active {
  background: rgba(43,92,230,.25);
  color: #fff;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.nav-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500;
  flex-shrink: 0;
}

.sidebar-bottom {
  padding: 1rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: .78rem;
}

.sidebar-user-info {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: .75rem;
  color: rgba(255,255,255,.6);
}

.sidebar-links { display: flex; flex-direction: column; gap: 6px; }

.sidebar-link {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  color: rgba(255,255,255,.5);
  font-size: .8rem;
  text-decoration: none;
  transition: all .15s;
  background: none; border: none; font-family: var(--font-sans);
  width: 100%; text-align: left;
}

.sidebar-link:hover { color: #fff; background: rgba(255,255,255,.08); }

/* ── MAIN CONTENT ── */
.main {
  margin-left: var(--sidebar);
  flex: 1;
  display: flex; flex-direction: column;
  min-height: 100vh;
}

.topbar {
  position: sticky; top: 0; z-index: 5;
  background: rgba(250,249,246,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 1rem;
  padding: .75rem 2rem;
}

.page-title {
  font-family: var(--font-serif);
  font-size: 1.25rem;
  color: var(--ink);
}

.month-nav {
  display: flex; align-items: center; gap: 6px;
  margin-left: auto;
}

.month-nav button {
  width: 30px; height: 30px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-size: 1rem;
  color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}

.month-nav button:hover { background: var(--mist); }

.month-label {
  font-size: .88rem; font-weight: 500;
  min-width: 130px; text-align: center;
  color: var(--ink);
}

.content { padding: 1.5rem 2rem 3rem; }

/* ── HABIT TABLE ── */
.habits-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}

.habits-toolbar-left { font-size: .82rem; color: var(--ink3); }

.btn-add-habit {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px;
  background: var(--accent);
  color: #fff;
  border: none; border-radius: 8px;
  font-size: .82rem; font-weight: 500; font-family: var(--font-sans);
  cursor: pointer;
  transition: opacity .15s;
}
.btn-add-habit:hover { opacity: .88; }

.calendar-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); }

table.cal { border-collapse: collapse; width: 100%; min-width: 560px; }

table.cal th, table.cal td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 11px; text-align: center; padding: 0;
}

table.cal th:last-child, table.cal td:last-child { border-right: none; }

table.cal th.habit-col {
  text-align: left; padding: 8px 12px;
  min-width: 150px; font-weight: 500; font-size: 12px;
  color: var(--ink); background: var(--mist);
  border-bottom: 2px solid var(--border);
}

table.cal th.day-th {
  min-width: 24px; width: 24px; padding: 4px 0;
  color: var(--ink3); background: var(--mist);
  border-bottom: 2px solid var(--border);
  font-weight: 400;
}

table.cal th.day-th.weekend { background: var(--wknd-bg); color: var(--accent); }

table.cal .dow-row th {
  font-size: 9px; font-style: italic;
  color: var(--ink3); height: 16px;
  background: var(--mist);
  border-bottom: 2px solid var(--border);
}

table.cal th.summary-th {
  min-width: 42px; padding: 4px 6px;
  font-size: 10px; color: var(--ink3);
  background: var(--mist);
  border-bottom: 2px solid var(--border);
}

table.cal td.habit-label {
  text-align: left; padding: 5px 12px;
  font-size: 12px; font-weight: 500;
  color: var(--ink); background: var(--mist);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 160px;
}

table.cal td.habit-label.editing { padding: 0; }

table.cal td.habit-label input {
  width: 100%; padding: 5px 12px;
  border: none; outline: none;
  font: 500 12px var(--font-sans);
  background: #fff; color: var(--ink);
}

table.cal td.day-cell {
  height: 28px; width: 24px;
  cursor: pointer;
  transition: background .08s;
}

table.cal td.day-cell:hover { background: #dce9ff !important; }
table.cal td.day-cell.done { background: var(--done-bg); }
table.cal td.day-cell.skip { background: var(--skip-bg); }
table.cal td.day-cell.weekend:not(.done):not(.skip) { background: var(--wknd-bg); }

table.cal td.day-cell span { font-size: 12px; pointer-events: none; color: var(--accent); }
table.cal td.day-cell.skip span { color: #dc2626; }

table.cal td.empty-cell { background: var(--mist); }

table.cal td.summary-cell {
  font-size: 11px; font-weight: 500;
  color: var(--ink2); background: var(--mist);
  padding: 2px 6px;
}

.del-habit {
  font-size: 10px; opacity: 0; margin-left: 5px;
  color: var(--danger); cursor: pointer;
}
table.cal tr:hover .del-habit { opacity: 1; }

/* ── SUMMARY TAB ── */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px; margin-bottom: 1.5rem;
}

.metric-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem;
}

.metric-card .mlabel { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--ink3); margin-bottom: 6px; }
.metric-card .mvalue { font-family: var(--font-serif); font-size: 2rem; color: var(--ink); }
.metric-card .msub   { font-size: .75rem; color: var(--ink3); margin-top: 2px; }

/* leaderboard */
.leaderboard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.leaderboard-header {
  padding: .9rem 1.2rem;
  background: var(--mist);
  border-bottom: 1px solid var(--border);
  font-size: .8rem; font-weight: 500; color: var(--ink);
  display: flex; align-items: center; gap: 6px;
}

.lb-row {
  display: flex; align-items: center;
  padding: .7rem 1.2rem;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  font-size: .85rem;
}
.lb-row:last-child { border-bottom: none; }

.lb-rank { font-weight: 500; color: var(--ink3); min-width: 20px; font-size: .8rem; }
.lb-name { flex: 1; font-weight: 500; }
.lb-bar-wrap { flex: 2; height: 8px; background: var(--mist); border-radius: 4px; overflow: hidden; }
.lb-bar { height: 100%; border-radius: 4px; }
.lb-score { font-weight: 500; color: var(--ink); min-width: 40px; text-align: right; font-size: .8rem; }

/* summary table */
.summary-table {
  width: 100%; border-collapse: collapse;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  font-size: .8rem;
}

.summary-table th {
  background: var(--mist);
  padding: 8px 10px; text-align: center;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: .7rem; color: var(--ink3);
  font-weight: 500;
}

.summary-table td {
  padding: 6px 10px; text-align: center;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  color: var(--ink2);
}

.summary-table tr:last-child td { border-bottom: none; }

.summary-table td.name-col { text-align: left; font-weight: 500; color: var(--ink); }
.summary-table td.habit-col { text-align: left; color: var(--ink3); font-size: .75rem; }

.legend {
  display: flex; gap: 16px; font-size: .75rem;
  color: var(--ink3); margin-top: .75rem;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch {
  width: 14px; height: 14px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; display: none;
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--card);
  border-radius: 16px;
  padding: 1.5rem;
  min-width: 300px;
  max-width: 360px; width: 90%;
  box-shadow: 0 24px 60px rgba(0,0,0,.18);
  border: 1px solid var(--border);
}

.modal-box h3 { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: .3rem; }
.modal-box p  { font-size: .82rem; color: var(--ink3); margin-bottom: 1rem; }

.modal-box input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font: 400 .9rem var(--font-sans);
  background: var(--mist); color: var(--ink);
  outline: none; margin-bottom: 1rem;
  transition: border-color .2s;
}
.modal-box input:focus { border-color: var(--accent); background: #fff; }

.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

.btn-confirm {
  padding: 9px 18px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font: 500 .85rem var(--font-sans); cursor: pointer;
  transition: opacity .15s;
}
.btn-confirm:hover { opacity: .88; }
.btn-confirm:disabled { opacity: .5; cursor: not-allowed; }

.btn-cancel {
  padding: 9px 18px;
  background: var(--mist); color: var(--ink2);
  border: 1px solid var(--border); border-radius: 8px;
  font: 400 .85rem var(--font-sans); cursor: pointer;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--ink); color: #fff;
  padding: 10px 18px; border-radius: 10px;
  font-size: .85rem; z-index: 300;
  transform: translateY(60px); opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
.toast.show { transform: none; opacity: 1; }

/* ── LOADING ── */
.loader {
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; color: var(--ink3); font-size: .9rem;
  gap: 10px;
}

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── MY HABITS ONLY (non-admin sees own tab only) ── */
.own-badge {
  font-size: .65rem; padding: 2px 6px;
  background: rgba(43,92,230,.12); color: var(--accent);
  border-radius: 4px; margin-left: 4px;
}

/* Responsive */
@media (max-width: 700px) {
  :root { --sidebar: 0px; }
  .sidebar { transform: translateX(-220px); width: 220px; }
  .sidebar.open { transform: none; }
  .main { margin-left: 0; }
  .topbar { padding: .75rem 1rem; }
  .content { padding: 1rem; }
  .mobile-menu-btn { display: flex !important; }
}

.mobile-menu-btn {
  display: none;
  align-items: center; justify-content: center;
  width: 34px; height: 34px;
  border: 1px solid var(--border);
  border-radius: 7px; background: var(--card);
  cursor: pointer; margin-right: .5rem;
  font-size: 1rem;
}
</style>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-box">🌿</div>
      HabitFlow
    </div>

    <div class="sidebar-section-label">Members</div>
    <nav class="user-nav" id="userNav">
      <div class="loader" style="min-height:60px"><div class="spinner"></div></div>
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-user-info">
        <div id="sidebarAvatar" style="width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0"></div>
        <span id="sidebarName" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></span>
      </div>
      <div class="sidebar-links">
        <a id="adminLink" class="sidebar-link" href="admin.html" style="display:none">⚙️ Admin panel</a>
        <button class="sidebar-link" onclick="signOut()">↩ Sign out</button>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="topbar">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="page-title" id="pageTitle">Loading…</span>
      <div class="month-nav" id="monthNav" style="display:none">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="monthLabel"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="loader"><div class="spinner"></div> Loading habits…</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <input id="modalInput" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modalConfirm">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW    = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const USER_COLORS = ["#2b5ce6","#059669","#7c3aed","#d97706","#0891b2","#dc2626","#db2777","#65a30d"];
const USER_FILLS  = ["#dce9ff","#d1fae5","#ede9fe","#fef3c7","#e0f2fe","#fee2e2","#fce7f3","#ecfccb"];

let state = {
  currentUser: null,     // auth user
  profile: null,         // own profile row
  profiles: [],          // all profiles
  habits: {},            // {userId: [{id, name, sort_order}]}
  logs: {},              // {userId: {habitId: {date: status}}}
  currentView: null,     // userId or '__summary__'
  currentMonth: new Date().getMonth(),
  currentYear:  new Date().getFullYear(),
  isAdmin: false,
};

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  state.currentUser = session.user;
  await loadAllData();
}

async function loadAllData() {
  // Load own profile
  const { data: prof } = await sb.from('profiles').select('*').eq('id', state.currentUser.id).single();
  state.profile = prof;
  state.isAdmin = prof?.role === 'admin';

  // Show admin link if admin
  if (state.isAdmin) document.getElementById('adminLink').style.display = '';

  // Update sidebar user info
  document.getElementById('sidebarName').textContent = prof?.display_name || prof?.email || 'You';
  const av = document.getElementById('sidebarAvatar');
  av.textContent = (prof?.display_name || 'U').slice(0,2).toUpperCase();
  av.style.background = prof?.color || '#2b5ce6';

  // Load profiles (admin sees all, member sees own)
  let profilesQuery = sb.from('profiles').select('*').order('created_at');
  if (!state.isAdmin) profilesQuery = profilesQuery.eq('id', state.currentUser.id);
  const { data: profiles } = await profilesQuery;
  state.profiles = profiles || [];

  // Assign colors to profiles
  state.profiles.forEach((p, i) => {
    if (!p.color) p.color = USER_COLORS[i % USER_COLORS.length];
    if (!p.fill)  p.fill  = USER_FILLS[i % USER_FILLS.length];
  });

  // Load habits for visible profiles
  const userIds = state.profiles.map(p => p.id);
  const { data: habitsData } = await sb.from('habits').select('*').in('user_id', userIds).order('sort_order');
  state.habits = {};
  (habitsData || []).forEach(h => {
    if (!state.habits[h.user_id]) state.habits[h.user_id] = [];
    state.habits[h.user_id].push(h);
  });

  // Load logs for current year
  const startDate = `${state.currentYear}-01-01`;
  const endDate   = `${state.currentYear}-12-31`;
  const { data: logsData } = await sb.from('habit_logs').select('*').in('user_id', userIds).gte('log_date', startDate).lte('log_date', endDate);
  state.logs = {};
  (logsData || []).forEach(l => {
    if (!state.logs[l.user_id]) state.logs[l.user_id] = {};
    if (!state.logs[l.user_id][l.habit_id]) state.logs[l.user_id][l.habit_id] = {};
    state.logs[l.user_id][l.habit_id][l.log_date] = l.status;
  });

  // Set initial view
  const defaultView = state.isAdmin ? '__summary__' : state.currentUser.id;
  renderSidebar();
  switchView(state.currentView || defaultView);
}

// ──────────────────────────────────────────────
// SIDEBAR
// ──────────────────────────────────────────────
function renderSidebar() {
  const nav = document.getElementById('userNav');
  let html = '';

  if (state.isAdmin) {
    html += `<div class="nav-item ${state.currentView === '__summary__' ? 'active' : ''}" onclick="switchView('__summary__')">
      <span>📊</span> Summary
    </div>`;
  }

  state.profiles.forEach((p, i) => {
    const color = p.color || USER_COLORS[i % USER_COLORS.length];
    const fill  = p.fill  || USER_FILLS[i % USER_FILLS.length];
    const isActive = state.currentView === p.id;
    const isOwn    = p.id === state.currentUser.id;
    html += `<div class="nav-item ${isActive ? 'active' : ''}" onclick="switchView('${p.id}')">
      <div class="nav-avatar" style="background:${fill};color:${color}">${(p.display_name || p.email).slice(0,2).toUpperCase()}</div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.display_name || p.email}</span>
      ${isOwn ? '<span class="own-badge">you</span>' : ''}
    </div>`;
  });

  nav.innerHTML = html;
}

// ──────────────────────────────────────────────
// VIEWS
// ──────────────────────────────────────────────
function switchView(viewId) {
  state.currentView = viewId;
  renderSidebar();

  const isSummary = viewId === '__summary__';
  document.getElementById('monthNav').style.display = isSummary ? 'none' : '';
  document.getElementById('pageTitle').textContent = isSummary ? 'Summary' :
    (state.profiles.find(p => p.id === viewId)?.display_name || 'Habits');

  updateMonthLabel();

  if (isSummary) {
    renderSummary();
  } else {
    renderUserView(viewId);
  }
}

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = `${MONTHS[state.currentMonth]} ${state.currentYear}`;
}

function changeMonth(dir) {
  state.currentMonth = (state.currentMonth + 12 + dir) % 12;
  renderUserView(state.currentView);
  updateMonthLabel();
}

function daysInMonth(m, y) {
  return new Date(y, m + 1, 0).getDate();
}

function isWeekend(m, d, y) {
  const dow = new Date(y, m, d).getDay();
  return dow === 0 || dow === 6;
}

// ──────────────────────────────────────────────
// USER VIEW
// ──────────────────────────────────────────────
function renderUserView(userId) {
  const profile = state.profiles.find(p => p.id === userId);
  if (!profile) return;

  const isOwn = userId === state.currentUser.id;
  const canEdit = isOwn || state.isAdmin;
  const habits = state.habits[userId] || [];
  const m = state.currentMonth;
  const y = state.currentYear;
  const days = daysInMonth(m, y);

  let html = '';

  // Toolbar
  html += `<div class="habits-toolbar">
    <div class="habits-toolbar-left">Click to mark done &nbsp;·&nbsp; Shift+click to skip</div>
    ${canEdit ? `<button class="btn-add-habit" onclick="openAddHabit('${userId}')">+ Add habit</button>` : ''}
  </div>`;

  // Calendar
  html += `<div class="calendar-wrap"><table class="cal">`;

  // Header row — day numbers
  html += `<tr><th class="habit-col">Habit</th>`;
  for (let d = 1; d <= days; d++) {
    const we = isWeekend(m, d, y);
    html += `<th class="day-th${we ? ' weekend' : ''}">${d}</th>`;
  }
  html += `<th class="summary-th">Done</th><th class="summary-th">Skip</th><th class="summary-th">%</th></tr>`;

  // DOW row
  html += `<tr class="dow-row"><th class="habit-col"></th>`;
  for (let d = 1; d <= days; d++) {
    html += `<th class="day-th">${DOW[new Date(y, m, d).getDay()]}</th>`;
  }
  html += `<th class="summary-th" colspan="3"></th></tr>`;

  // Habit rows
  if (habits.length === 0) {
    html += `<tr><td class="habit-label" colspan="${days + 4}" style="text-align:center;color:var(--ink3);padding:2rem">No habits yet — add your first one!</td></tr>`;
  } else {
    habits.forEach(habit => {
      const userLogs = (state.logs[userId] || {})[habit.id] || {};
      let done = 0, skip = 0;

      html += `<tr data-habit="${habit.id}" data-user="${userId}">`;

      // Habit label
      html += `<td class="habit-label">${escHtml(habit.name)}`;
      if (canEdit) html += `<span class="del-habit" onclick="deleteHabit('${userId}','${habit.id}')" title="Remove habit">✕</span>`;
      html += `</td>`;

      // Day cells
      for (let d = 1; d <= days; d++) {
        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const status  = userLogs[dateStr];
        const we      = isWeekend(m, d, y);
        let cls = 'day-cell';
        if (status === 'done') { cls += ' done'; done++; }
        else if (status === 'skip') { cls += ' skip'; skip++; }
        else if (we) cls += ' weekend';
        const sym = status === 'done' ? '✓' : status === 'skip' ? '✗' : '';
        const editAttr = canEdit ? `onclick="toggleCell('${userId}','${habit.id}','${dateStr}',event)"` : '';
        html += `<td class="${cls}" ${editAttr} title="${dateStr}"><span>${sym}</span></td>`;
      }

      // Summary cells
      const pct = days > 0 ? Math.round(done / days * 100) : 0;
      html += `<td class="summary-cell">${done}</td><td class="summary-cell">${skip}</td><td class="summary-cell">${pct}%</td>`;
      html += `</tr>`;
    });
  }

  html += `</table></div>`;
  html += `<div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--done-bg)"></div>Done</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--skip-bg)"></div>Skipped</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--wknd-bg)"></div>Weekend</div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

// ──────────────────────────────────────────────
// SUMMARY VIEW
// ──────────────────────────────────────────────
function renderSummary() {
  const y = state.currentYear;

  // Compute year totals per user
  const userTotals = state.profiles.map((p, i) => {
    const habits = state.habits[p.id] || [];
    let total = 0;
    habits.forEach(h => {
      const logsByHabit = (state.logs[p.id] || {})[h.id] || {};
      total += Object.values(logsByHabit).filter(v => v === 'done').length;
    });
    return { profile: p, total, color: p.color || USER_COLORS[i], fill: p.fill || USER_FILLS[i] };
  }).sort((a, b) => b.total - a.total);

  const totalAll = userTotals.reduce((s, u) => s + u.total, 0);
  const maxScore = userTotals[0]?.total || 1;

  let html = '';

  // Metric cards
  html += `<div class="summary-cards">
    <div class="metric-card">
      <div class="mlabel">Total check-ins</div>
      <div class="mvalue">${totalAll}</div>
      <div class="msub">across all users &amp; habits</div>
    </div>
    <div class="metric-card">
      <div class="mlabel">Top member</div>
      <div class="mvalue" style="font-size:1.4rem;padding-top:.3rem">${userTotals[0]?.profile.display_name || '—'}</div>
      <div class="msub">${userTotals[0]?.total || 0} check-ins this year</div>
    </div>
    <div class="metric-card">
      <div class="mlabel">Members</div>
      <div class="mvalue">${state.profiles.length}</div>
      <div class="msub">${Object.values(state.habits).flat().length} habits total</div>
    </div>
    <div class="metric-card">
      <div class="mlabel">Current month</div>
      <div class="mvalue" style="font-size:1.1rem;padding-top:.4rem">${MONTHS[state.currentMonth]}</div>
      <div class="msub">${y}</div>
    </div>
  </div>`;

  // Leaderboard
  html += `<div class="leaderboard">
    <div class="leaderboard-header">🏆 Leaderboard · ${y}</div>`;
  userTotals.forEach((u, i) => {
    const pct = Math.round(u.total / maxScore * 100);
    const medals = ['🥇','🥈','🥉'];
    html += `<div class="lb-row">
      <div class="lb-rank">${medals[i] || (i+1)}</div>
      <div class="nav-avatar" style="background:${u.fill};color:${u.color};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0">${(u.profile.display_name||'U').slice(0,2).toUpperCase()}</div>
      <div class="lb-name">${escHtml(u.profile.display_name || u.profile.email)}</div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${u.color}"></div></div>
      <div class="lb-score">${u.total}</div>
    </div>`;
  });
  html += `</div>`;

  // Monthly breakdown table
  html += `<div style="overflow-x:auto"><table class="summary-table">
    <thead><tr>
      <th style="text-align:left">Habit</th>
      <th style="text-align:left">Member</th>
      ${MONTHS.map(m => `<th>${m.slice(0,3)}</th>`).join('')}
      <th>Year</th>
    </tr></thead><tbody>`;

  const allHabits = Object.values(state.habits).flat();
  const habitsByName = {};
  allHabits.forEach(h => {
    if (!habitsByName[h.name]) habitsByName[h.name] = [];
    habitsByName[h.name].push(h);
  });

  Object.entries(habitsByName).forEach(([hName, hList]) => {
    hList.forEach((h, hi) => {
      const profile = state.profiles.find(p => p.id === h.user_id);
      if (!profile) return;
      const logsByHabit = (state.logs[h.user_id] || {})[h.id] || {};
      const monthTotals = MONTHS.map((_, mi) => {
        const prefix = `${y}-${String(mi+1).padStart(2,'0')}`;
        return Object.entries(logsByHabit).filter(([d, v]) => d.startsWith(prefix) && v === 'done').length;
      });
      const yearTotal = monthTotals.reduce((s, v) => s + v, 0);
      html += `<tr>
        ${hi === 0 ? `<td class="habit-col" rowspan="${hList.length}" style="vertical-align:middle;font-weight:500;color:var(--ink)">${escHtml(hName)}</td>` : ''}
        <td class="name-col">${escHtml(profile.display_name || profile.email)}</td>
        ${monthTotals.map(v => `<td>${v || '—'}</td>`).join('')}
        <td style="font-weight:500;color:${profile.color}">${yearTotal}</td>
      </tr>`;
    });
  });

  html += `</tbody></table></div>`;

  document.getElementById('content').innerHTML = html;
}

// ──────────────────────────────────────────────
// CELL TOGGLE
// ──────────────────────────────────────────────
async function toggleCell(userId, habitId, dateStr, e) {
  if (!state.logs[userId]) state.logs[userId] = {};
  if (!state.logs[userId][habitId]) state.logs[userId][habitId] = {};

  const current = state.logs[userId][habitId][dateStr];
  let newStatus;

  if (e.shiftKey) {
    newStatus = current === 'skip' ? null : 'skip';
  } else {
    newStatus = current === 'done' ? null : 'done';
  }

  // Optimistic update
  if (newStatus) {
    state.logs[userId][habitId][dateStr] = newStatus;
  } else {
    delete state.logs[userId][habitId][dateStr];
  }

  renderUserView(userId);

  // Persist
  if (newStatus) {
    const { error } = await sb.from('habit_logs').upsert({
      user_id: userId, habit_id: habitId, log_date: dateStr, status: newStatus
    }, { onConflict: 'habit_id,log_date' });
    if (error) { showToast('Failed to save. Try again.'); return; }
  } else {
    const { error } = await sb.from('habit_logs').delete()
      .eq('habit_id', habitId).eq('log_date', dateStr).eq('user_id', userId);
    if (error) { showToast('Failed to clear. Try again.'); return; }
  }
}

// ──────────────────────────────────────────────
// ADD HABIT
// ──────────────────────────────────────────────
function openAddHabit(userId) {
  openModal('Add habit', 'Enter a name for this habit', 'Habit name…', 'Add', async (name) => {
    const sortOrder = (state.habits[userId] || []).length;
    const { data, error } = await sb.from('habits').insert({
      user_id: userId, name, sort_order: sortOrder
    }).select().single();

    if (error) { showToast('Could not add habit.'); return; }

    if (!state.habits[userId]) state.habits[userId] = [];
    state.habits[userId].push(data);
    closeModal();
    renderUserView(userId);
    showToast('Habit added!');
  });
}

async function deleteHabit(userId, habitId) {
  if (!confirm('Remove this habit and all its data?')) return;

  const { error } = await sb.from('habits').delete().eq('id', habitId).eq('user_id', userId);
  if (error) { showToast('Could not delete habit.'); return; }

  state.habits[userId] = (state.habits[userId] || []).filter(h => h.id !== habitId);
  if (state.logs[userId]) delete state.logs[userId][habitId];
  renderUserView(userId);
  showToast('Habit removed.');
}

// ──────────────────────────────────────────────
// MODAL
// ──────────────────────────────────────────────
let _modalCallback = null;

function openModal(title, desc, placeholder, confirmLabel, callback) {
  document.getElementById('modalTitle').textContent   = title;
  document.getElementById('modalDesc').textContent    = desc;
  document.getElementById('modalInput').placeholder  = placeholder;
  document.getElementById('modalInput').value        = '';
  document.getElementById('modalConfirm').textContent = confirmLabel;
  _modalCallback = callback;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modalInput').focus(), 50);
}

document.getElementById('modalConfirm').addEventListener('click', () => {
  const val = document.getElementById('modalInput').value.trim();
  if (!val || !_modalCallback) return;
  document.getElementById('modalConfirm').disabled = true;
  Promise.resolve(_modalCallback(val)).finally(() => {
    document.getElementById('modalConfirm').disabled = false;
  });
});

document.getElementById('modalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modalConfirm').click();
});

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  _modalCallback = null;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ──────────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ──────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ──────────────────────────────────────────────
// REALTIME (optional — live updates across tabs)
// ──────────────────────────────────────────────
sb.channel('habit_logs_changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'habit_logs' }, () => {
    loadAllData();
  }).subscribe();

// ── START ──
init();
</script>
