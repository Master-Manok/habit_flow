<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HabitFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #0f1117;
  --ink2:    #3d4152;
  --ink3:    #8a8fa8;
  --mist:    #f4f3ef;
  --cream:   #faf9f6;
  --accent:  #2b5ce6;
  --danger:  #dc2626;
  --done-bg: #c7dcff;
  --skip-bg: #ffd6d6;
  --wknd-bg: #e8f0fe;
  --border:  rgba(0,0,0,.09);
  --card:    #ffffff;
  --radius:  12px;
  --sidebar: 220px;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;
}

html, body { height: 100%; background: var(--cream); font-family: var(--font-sans); color: var(--ink); }

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  background: var(--ink);
  color: #fff;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 10;
  transition: transform .25s;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 1.5rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,.08);
  font-size: .95rem; font-weight: 500;
  color: #fff;
}

.logo-box {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.sidebar-section-label {
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: rgba(255,255,255,.3);
  padding: 1.25rem 1.25rem .4rem;
}

.user-nav { flex: 1; overflow-y: auto; padding-bottom: 1rem; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 1.25rem;
  cursor: pointer;
  transition: background .15s;
  font-size: .88rem;
  color: rgba(255,255,255,.7);
  position: relative;
}

.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }

.nav-item.active {
  background: rgba(43,92,230,.25);
  color: #fff;
}

.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.nav-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; flex-shrink: 0;
}

.own-badge {
  font-size: .65rem; padding: 2px 6px;
  background: rgba(43,92,230,.25); color: #9db8ff;
  border-radius: 4px; margin-left: auto;
}

.sidebar-bottom {
  padding: 1rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,.08);
}

.sidebar-user-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: .75rem;
}

.sidebar-user-info {
  flex: 1; overflow: hidden;
}

.sidebar-user-name {
  font-size: .82rem; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.sidebar-user-role {
  font-size: .7rem; color: rgba(255,255,255,.4);
}

.edit-name-btn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,.3); font-size: .85rem;
  padding: 2px 4px; transition: color .15s;
  flex-shrink: 0;
}
.edit-name-btn:hover { color: rgba(255,255,255,.8); }

.sidebar-links { display: flex; flex-direction: column; gap: 4px; }

.sidebar-link {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px; border-radius: 6px;
  cursor: pointer; color: rgba(255,255,255,.5);
  font-size: .8rem; text-decoration: none;
  transition: all .15s;
  background: none; border: none; font-family: var(--font-sans);
  width: 100%; text-align: left;
}
.sidebar-link:hover { color: #fff; background: rgba(255,255,255,.08); }

/* ── MAIN ── */
.main {
  margin-left: var(--sidebar);
  flex: 1; display: flex; flex-direction: column;
  min-height: 100vh;
}

.topbar {
  position: sticky; top: 0; z-index: 5;
  background: rgba(250,249,246,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 1rem;
  padding: .75rem 2rem;
  min-height: 54px;
}

.page-title {
  font-family: var(--font-serif);
  font-size: 1.25rem; color: var(--ink);
}

.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: .82rem; color: var(--ink3);
}

.breadcrumb-sep { opacity: .4; }

.breadcrumb-link {
  cursor: pointer; color: var(--accent);
  text-decoration: none;
}
.breadcrumb-link:hover { text-decoration: underline; }

.month-nav {
  display: flex; align-items: center; gap: 6px;
}

.month-nav button {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 1rem; color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.month-nav button:hover { background: var(--mist); }

.month-label {
  font-size: .88rem; font-weight: 500;
  min-width: 130px; text-align: center; color: var(--ink);
}

.content { padding: 1.5rem 2rem 3rem; }

/* ── YEARLY CALENDAR ── */
.year-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 1.5rem;
}

.year-title {
  font-family: var(--font-serif);
  font-size: 1.6rem; color: var(--ink);
}

.year-sub { font-size: .85rem; color: var(--ink3); }

.year-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

.month-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.2rem;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  position: relative;
  overflow: hidden;
}

.month-card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(43,92,230,.12);
  transform: translateY(-2px);
}

.month-card.current-month {
  border-color: var(--accent);
  background: linear-gradient(135deg, #fff 0%, #f0f5ff 100%);
}

.month-card.future {
  opacity: .5; cursor: default;
}
.month-card.future:hover {
  border-color: var(--border);
  box-shadow: none; transform: none;
}

.month-card-name {
  font-size: .78rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--ink3); margin-bottom: .5rem;
}

.month-card.current-month .month-card-name { color: var(--accent); }

.month-card-count {
  font-family: var(--font-serif);
  font-size: 1.8rem; color: var(--ink);
  line-height: 1; margin-bottom: .4rem;
}

.month-card-pct {
  font-size: .78rem; color: var(--ink3);
  margin-bottom: .6rem;
}

.month-progress-track {
  height: 5px; background: var(--mist);
  border-radius: 3px; overflow: hidden;
}

.month-progress-fill {
  height: 100%; border-radius: 3px;
  background: var(--accent);
  transition: width .4s ease;
}

.month-card.current-month .month-progress-fill { background: var(--accent); }

.month-card-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: .65rem; padding: 2px 7px;
  background: var(--accent); color: #fff;
  border-radius: 20px; font-weight: 500;
}

/* ── HABIT TABLE ── */
.habits-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; flex-wrap: wrap; gap: 8px;
}

.habits-toolbar-left { font-size: .82rem; color: var(--ink3); }

.btn-add-habit {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-size: .82rem; font-weight: 500; font-family: var(--font-sans);
  cursor: pointer; transition: opacity .15s;
}
.btn-add-habit:hover { opacity: .88; }

.calendar-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
}

table.cal { border-collapse: collapse; width: 100%; min-width: 560px; }

table.cal th, table.cal td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 11px; text-align: center; padding: 0;
}
table.cal th:last-child, table.cal td:last-child { border-right: none; }

table.cal th.habit-col {
  text-align: left; padding: 8px 12px;
  min-width: 150px; font-weight: 500; font-size: 12px;
  color: var(--ink); background: var(--mist);
  border-bottom: 2px solid var(--border);
}

table.cal th.day-th {
  min-width: 24px; width: 24px; padding: 4px 0;
  color: var(--ink3); background: var(--mist);
  border-bottom: 2px solid var(--border); font-weight: 400;
}
table.cal th.day-th.weekend { background: var(--wknd-bg); color: var(--accent); }

table.cal .dow-row th {
  font-size: 9px; font-style: italic;
  color: var(--ink3); height: 16px;
  background: var(--mist); border-bottom: 2px solid var(--border);
}

table.cal th.summary-th {
  min-width: 42px; padding: 4px 6px;
  font-size: 10px; color: var(--ink3);
  background: var(--mist); border-bottom: 2px solid var(--border);
}

table.cal td.habit-label {
  text-align: left; padding: 5px 12px;
  font-size: 12px; font-weight: 500;
  color: var(--ink); background: var(--mist);
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 160px;
}

table.cal td.day-cell {
  height: 28px; width: 24px; cursor: pointer;
  transition: background .08s; user-select: none;
}
table.cal td.day-cell:hover { filter: brightness(.93); }
table.cal td.day-cell.done  { background: var(--done-bg); }
table.cal td.day-cell.skip  { background: var(--skip-bg); }
table.cal td.day-cell.weekend:not(.done):not(.skip) { background: var(--wknd-bg); }
table.cal td.day-cell.inactive { background: var(--mist); cursor: default; opacity: .4; }

table.cal td.day-cell span { font-size: 12px; pointer-events: none; color: var(--accent); }
table.cal td.day-cell.skip span { color: #dc2626; }

table.cal td.summary-cell {
  font-size: 11px; font-weight: 500;
  color: var(--ink2); background: var(--mist); padding: 2px 6px;
}

.del-habit { font-size: 10px; opacity: 0; margin-left: 5px; color: var(--danger); cursor: pointer; }
table.cal tr:hover .del-habit { opacity: 1; }

/* ── SUMMARY / LEADERBOARD ── */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px; margin-bottom: 1.5rem;
}

.metric-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.2rem;
}
.metric-card .mlabel { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--ink3); margin-bottom: 6px; }
.metric-card .mvalue { font-family: var(--font-serif); font-size: 2rem; color: var(--ink); }
.metric-card .msub   { font-size: .75rem; color: var(--ink3); margin-top: 2px; }

.leaderboard {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem;
}

.leaderboard-header {
  padding: .9rem 1.2rem; background: var(--mist);
  border-bottom: 1px solid var(--border);
  font-size: .8rem; font-weight: 500; color: var(--ink);
}

.lb-row {
  display: flex; align-items: center;
  padding: .7rem 1.2rem; border-bottom: 1px solid var(--border);
  gap: 12px; font-size: .85rem;
}
.lb-row:last-child { border-bottom: none; }
.lb-rank { font-weight: 500; color: var(--ink3); min-width: 24px; font-size: .82rem; }
.lb-name { flex: 1; font-weight: 500; }
.lb-bar-wrap { flex: 2; height: 8px; background: var(--mist); border-radius: 4px; overflow: hidden; }
.lb-bar { height: 100%; border-radius: 4px; transition: width .6s ease; }
.lb-score { font-weight: 500; color: var(--ink); min-width: 40px; text-align: right; font-size: .8rem; }
.lb-row.is-me { background: rgba(43,92,230,.04); }

.summary-table-wrap { overflow-x: auto; }

.summary-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; font-size: .8rem;
}
.summary-table th {
  background: var(--mist); padding: 8px 10px; text-align: center;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  font-size: .7rem; color: var(--ink3); font-weight: 500;
}
.summary-table td {
  padding: 6px 10px; text-align: center;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  color: var(--ink2);
}
.summary-table tr:last-child td { border-bottom: none; }
.summary-table td.name-col { text-align: left; font-weight: 500; color: var(--ink); }
.summary-table td.habit-col-td { text-align: left; color: var(--ink3); font-size: .75rem; }

.legend {
  display: flex; gap: 16px; font-size: .75rem;
  color: var(--ink3); margin-top: .75rem;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--card); border-radius: 16px;
  padding: 1.5rem; min-width: 300px; max-width: 360px; width: 90%;
  box-shadow: 0 24px 60px rgba(0,0,0,.18);
  border: 1px solid var(--border);
}

.modal-box h3 { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: .3rem; }
.modal-box p  { font-size: .82rem; color: var(--ink3); margin-bottom: 1rem; }

.modal-box input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font: 400 .9rem var(--font-sans);
  background: var(--mist); color: var(--ink);
  outline: none; margin-bottom: 1rem; transition: border-color .2s;
}
.modal-box input:focus { border-color: var(--accent); background: #fff; }

.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

.btn-confirm {
  padding: 9px 18px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font: 500 .85rem var(--font-sans); cursor: pointer; transition: opacity .15s;
}
.btn-confirm:hover { opacity: .88; }
.btn-confirm:disabled { opacity: .5; cursor: not-allowed; }

.btn-cancel {
  padding: 9px 18px; background: var(--mist); color: var(--ink2);
  border: 1px solid var(--border); border-radius: 8px;
  font: 400 .85rem var(--font-sans); cursor: pointer;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--ink); color: #fff;
  padding: 10px 18px; border-radius: 10px;
  font-size: .85rem; z-index: 300;
  transform: translateY(60px); opacity: 0;
  transition: all .3s; pointer-events: none;
}
.toast.show { transform: none; opacity: 1; }

/* ── LOADER ── */
.loader {
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; color: var(--ink3); font-size: .9rem; gap: 10px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  :root { --sidebar: 0px; }
  .sidebar { transform: translateX(-220px); width: 220px; }
  .sidebar.open { transform: none; }
  .main { margin-left: 0; }
  .topbar { padding: .75rem 1rem; }
  .content { padding: 1rem; }
  .mobile-menu-btn { display: flex !important; }
  .year-grid { grid-template-columns: repeat(2, 1fr); }
}

.mobile-menu-btn {
  display: none; align-items: center; justify-content: center;
  width: 34px; height: 34px; border: 1px solid var(--border);
  border-radius: 7px; background: var(--card);
  cursor: pointer; margin-right: .5rem; font-size: 1rem;
}
</style>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-box">🌿</div>
      HabitFlow
    </div>

    <div class="sidebar-section-label">Navigation</div>
    <nav class="user-nav" id="userNav">
      <div class="loader" style="min-height:60px"><div class="spinner"></div></div>
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-user-row">
        <div id="sidebarAvatar" style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0"></div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarName"></div>
          <div class="sidebar-user-role" id="sidebarRole"></div>
        </div>
        <button class="edit-name-btn" onclick="openEditName()" title="Edit display name">✏️</button>
      </div>
      <div class="sidebar-links">
        <a id="adminLink" class="sidebar-link" href="admin.html" style="display:none">⚙️ Admin panel</a>
        <button class="sidebar-link" onclick="signOut()">↩ Sign out</button>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="topbar" id="topbar">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
      <div id="topbarLeft" style="display:flex;align-items:center;gap:8px;flex:1">
        <span class="page-title" id="pageTitle">Loading…</span>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content">
      <div class="loader"><div class="spinner"></div> Loading…</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <input id="modalInput" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modalConfirm">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────
const MONTHS     = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW        = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const USER_COLORS = ["#2b5ce6","#059669","#7c3aed","#d97706","#0891b2","#dc2626","#db2777","#65a30d"];
const USER_FILLS  = ["#dce9ff","#d1fae5","#ede9fe","#fef3c7","#e0f2fe","#fee2e2","#fce7f3","#ecfccb"];

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let S = {
  authUser:     null,
  profile:      null,
  profiles:     [],
  habits:       {},   // {userId: [{id, name, created_at}]}
  logs:         {},   // {userId: {habitId: {dateStr: status}}}
  currentView:  null, // 'home' | 'month:{m}' | 'summary'
  currentYear:  new Date().getFullYear(),
  isAdmin:      false,
};

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  S.authUser = session.user;
  await loadAll();
}

async function loadAll() {
  // Own profile
  const { data: prof } = await sb.from('profiles').select('*').eq('id', S.authUser.id).single();
  S.profile = prof;
  S.isAdmin = prof?.role === 'admin';

  // Sidebar user info
  updateSidebarUser();
  if (S.isAdmin) document.getElementById('adminLink').style.display = '';

  // All profiles (everyone sees all for leaderboard)
  const { data: profiles } = await sb.from('profiles').select('*').order('created_at');
  S.profiles = (profiles || []).map((p, i) => ({
    ...p,
    color: p.color || USER_COLORS[i % USER_COLORS.length],
    fill:  p.fill  || USER_FILLS[i % USER_FILLS.length],
  }));

  // Load own habits only
  const { data: habitsData } = await sb.from('habits').select('*')
    .eq('user_id', S.authUser.id).order('created_at');
  S.habits[S.authUser.id] = habitsData || [];

  // Load own logs for current year
  await loadLogs(S.authUser.id);

  // Load all users' logs for summary/leaderboard (done count only)
  for (const p of S.profiles) {
    if (p.id === S.authUser.id) continue;
    const { data: hData } = await sb.from('habits').select('*').eq('user_id', p.id).order('created_at');
    S.habits[p.id] = hData || [];
    await loadLogs(p.id);
  }

  renderSidebar();
  navigateTo(S.currentView || 'home');
}

async function loadLogs(userId) {
  const y = S.currentYear;
  const { data: logsData } = await sb.from('habit_logs').select('*')
    .eq('user_id', userId)
    .gte('log_date', `${y}-01-01`)
    .lte('log_date', `${y}-12-31`);

  if (!S.logs[userId]) S.logs[userId] = {};
  (logsData || []).forEach(l => {
    if (!S.logs[userId][l.habit_id]) S.logs[userId][l.habit_id] = {};
    S.logs[userId][l.habit_id][l.log_date] = l.status;
  });
}

function updateSidebarUser() {
  const p = S.profile;
  if (!p) return;
  document.getElementById('sidebarName').textContent = p.display_name || p.email;
  document.getElementById('sidebarRole').textContent = p.role === 'admin' ? 'Admin' : 'Member';
  const av = document.getElementById('sidebarAvatar');
  av.textContent = (p.display_name || p.email || 'U').slice(0,2).toUpperCase();
  const idx = S.profiles.findIndex(x => x.id === p.id);
  av.style.background = USER_COLORS[idx >= 0 ? idx % USER_COLORS.length : 0];
}

// ─────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────
function renderSidebar() {
  const nav = document.getElementById('userNav');
  const v = S.currentView || 'home';
  let html = '';

  html += `<div class="nav-item ${v === 'home' ? 'active' : ''}" onclick="navigateTo('home')">
    <span style="font-size:1rem">🏠</span> My Year
  </div>`;

  html += `<div class="nav-item ${v === 'summary' ? 'active' : ''}" onclick="navigateTo('summary')">
    <span style="font-size:1rem">🏆</span> Leaderboard
  </div>`;

  // Month sub-items visible when in month view
  if (v.startsWith('month:')) {
    const m = parseInt(v.split(':')[1]);
    html += `<div class="nav-item active" style="padding-left:2rem;font-size:.82rem">
      <span>📅</span> ${MONTHS[m]}
    </div>`;
  }

  nav.innerHTML = html;
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function navigateTo(view) {
  S.currentView = view;
  renderSidebar();

  const titleEl   = document.getElementById('pageTitle');
  const actionsEl = document.getElementById('topbarActions');
  const topLeft   = document.getElementById('topbarLeft');

  actionsEl.innerHTML = '';
  topLeft.innerHTML   = '';

  if (view === 'home') {
    titleEl.textContent = '';
    topLeft.innerHTML = `<span class="page-title">My Year &nbsp;<span style="font-size:.9rem;color:var(--ink3);font-family:var(--font-sans)">${S.currentYear}</span></span>`;
    renderHome();

  } else if (view.startsWith('month:')) {
    const m = parseInt(view.split(':')[1]);
    topLeft.innerHTML = `<div style="display:flex;align-items:center;gap:8px">
      <button onclick="navigateTo('home')" style="display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.82rem;color:var(--ink2);font-family:var(--font-sans)">← Home</button>
      <span style="color:var(--ink3);font-size:.85rem">›</span>
      <span style="color:var(--ink);font-weight:500;font-size:.95rem">${MONTHS[m]} ${S.currentYear}</span>
    </div>`;
    actionsEl.innerHTML = `<div class="month-nav">
      <button onclick="shiftMonth(-1)" title="Previous month">‹</button>
      <button onclick="shiftMonth(1)" title="Next month">›</button>
    </div>`;
    renderMonthView(m);

  } else if (view === 'summary') {
    topLeft.innerHTML = `<div style="display:flex;align-items:center;gap:8px">
      <button onclick="navigateTo('home')" style="display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.82rem;color:var(--ink2);font-family:var(--font-sans)">← Home</button>
      <span style="color:var(--ink3);font-size:.85rem">›</span>
      <span style="color:var(--ink);font-weight:500;font-size:.95rem">Leaderboard</span>
    </div>`;
    renderSummary();
  }
}

function shiftMonth(dir) {
  const m = parseInt(S.currentView.split(':')[1]);
  const newM = (m + 12 + dir) % 12;
  navigateTo(`month:${newM}`);
}

// ─────────────────────────────────────────
// HOME — YEARLY CALENDAR
// ─────────────────────────────────────────
function renderHome() {
  const uid   = S.authUser.id;
  const y     = S.currentYear;
  const now   = new Date();
  const curM  = now.getMonth();
  const curY  = now.getFullYear();

  // Total done for year banner
  let yearDone = 0;
  (S.habits[uid] || []).forEach(h => {
    const logsByHabit = (S.logs[uid] || {})[h.id] || {};
    yearDone += Object.values(logsByHabit).filter(v => v === 'done').length;
  });

  let html = `
    <div class="year-header">
      <div>
        <div class="year-title">${S.profile?.display_name?.split(' ')[0] || 'Your'}'s ${y}</div>
        <div class="year-sub">${yearDone} total check-ins this year · click any month to track</div>
      </div>
    </div>
    <div class="year-grid">`;

  for (let m = 0; m < 12; m++) {
    const isFuture  = (y === curY && m > curM) || y > curY;
    const isCurrent = (y === curY && m === curM);

    // Compute stats for this month
    const days = daysInMonth(m, y);
    let done = 0, possible = 0;

    (S.habits[uid] || []).forEach(h => {
      // Only count days from habit's creation month onward
      const habitCreated = new Date(h.created_at);
      const habitYear    = habitCreated.getFullYear();
      const habitMonth   = habitCreated.getMonth();

      // If habit wasn't created yet in this month+year, skip
      if (y < habitYear || (y === habitYear && m < habitMonth)) return;

      // Start day: if same month as creation, start from creation day; else day 1
      const startDay = (y === habitYear && m === habitMonth) ? habitCreated.getDate() : 1;
      // End day: if future month use 0 possible; if current month use today
      const endDay   = isFuture ? 0 : (isCurrent ? now.getDate() : days);

      possible += Math.max(0, endDay - startDay + 1);

      const logsByHabit = (S.logs[uid] || {})[h.id] || {};
      for (let d = startDay; d <= endDay; d++) {
        const ds = dateStr(y, m, d);
        if (logsByHabit[ds] === 'done') done++;
      }
    });

    const pct    = possible > 0 ? Math.round(done / possible * 100) : 0;
    const isPast = !isFuture && !isCurrent;

    html += `<div class="month-card ${isCurrent ? 'current-month' : ''} ${isFuture ? 'future' : ''}"
      onclick="${isFuture ? '' : `navigateTo('month:${m}')`}">
      ${isCurrent ? '<div class="month-card-badge">Now</div>' : ''}
      <div class="month-card-name">${MONTHS[m]}</div>
      <div class="month-card-count">${isFuture ? '—' : done}</div>
      <div class="month-card-pct">${isFuture ? 'upcoming' : (possible === 0 ? 'no habits yet' : `${pct}% · ${done}/${possible} days`)}</div>
      <div class="month-progress-track">
        <div class="month-progress-fill" style="width:${isFuture ? 0 : pct}%"></div>
      </div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

// ─────────────────────────────────────────
// MONTH VIEW — HABIT TRACKER
// ─────────────────────────────────────────
function renderMonthView(m) {
  const uid    = S.authUser.id;
  const y      = S.currentYear;
  const days   = daysInMonth(m, y);
  const habits = S.habits[uid] || [];
  const now    = new Date();

  let html = '';

  // Toolbar
  html += `<div class="habits-toolbar">
    <div class="habits-toolbar-left">Click to cycle: <strong style="color:var(--accent)">done</strong> → <strong style="color:#dc2626">skip</strong> → clear</div>
    <button class="btn-add-habit" onclick="openAddHabit()">+ Add habit</button>
  </div>`;

  html += `<div class="calendar-wrap"><table class="cal">`;

  // Header: day numbers
  html += `<tr><th class="habit-col">Habit</th>`;
  for (let d = 1; d <= days; d++) {
    const we = isWeekend(m, d, y);
    html += `<th class="day-th${we ? ' weekend' : ''}">${d}</th>`;
  }
  html += `<th class="summary-th">Done</th><th class="summary-th">Skip</th><th class="summary-th">%</th></tr>`;

  // Header: day-of-week
  html += `<tr class="dow-row"><th class="habit-col"></th>`;
  for (let d = 1; d <= days; d++) {
    html += `<th class="day-th">${DOW[new Date(y, m, d).getDay()]}</th>`;
  }
  html += `<th class="summary-th" colspan="3"></th></tr>`;

  if (habits.length === 0) {
    html += `<tr><td class="habit-label" colspan="${days + 4}" style="text-align:center;color:var(--ink3);padding:2rem">
      No habits yet — add your first one!
    </td></tr>`;
  } else {
    habits.forEach(habit => {
      // Determine from which day this habit is active in this month
      const created   = new Date(habit.created_at);
      const cYear     = created.getFullYear();
      const cMonth    = created.getMonth();
      const cDay      = created.getDate();
      const activeFrom = (y === cYear && m === cMonth) ? cDay : 1;
      const isBeforeCreation = (y < cYear) || (y === cYear && m < cMonth);

      const logsByHabit = (S.logs[uid] || {})[habit.id] || {};
      let done = 0, skip = 0, possible = 0;

      html += `<tr>`;
      html += `<td class="habit-label">${escHtml(habit.name)}<span class="del-habit" onclick="deleteHabit('${habit.id}')" title="Remove">✕</span></td>`;

      for (let d = 1; d <= days; d++) {
        const ds  = dateStr(y, m, d);
        const we  = isWeekend(m, d, y);
        const inactive = isBeforeCreation || d < activeFrom;

        if (inactive) {
          html += `<td class="day-cell inactive"><span></span></td>`;
          continue;
        }

        possible++;
        const status = logsByHabit[ds];
        if (status === 'done') done++;
        if (status === 'skip') skip++;

        let cls = 'day-cell';
        if (status === 'done')      cls += ' done';
        else if (status === 'skip') cls += ' skip';
        else if (we)                cls += ' weekend';

        const sym = status === 'done' ? '✓' : status === 'skip' ? '✗' : '';
        html += `<td class="${cls}" onclick="toggleCell('${habit.id}','${ds}')" title="${ds}"><span>${sym}</span></td>`;
      }

      const pct = possible > 0 ? Math.round(done / possible * 100) : 0;
      html += `<td class="summary-cell">${done}</td><td class="summary-cell">${skip}</td><td class="summary-cell">${pct}%</td>`;
      html += `</tr>`;
    });
  }

  html += `</table></div>`;
  html += `<div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--done-bg)"></div>Done</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--skip-bg)"></div>Skipped</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--wknd-bg)"></div>Weekend</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--mist);opacity:.5"></div>Not active</div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

// ─────────────────────────────────────────
// SUMMARY / LEADERBOARD (visible to all)
// ─────────────────────────────────────────
function renderSummary() {
  const y   = S.currentYear;
  const uid = S.authUser.id;

  const userTotals = S.profiles.map((p, i) => {
    let total = 0;
    (S.habits[p.id] || []).forEach(h => {
      const lb = (S.logs[p.id] || {})[h.id] || {};
      total += Object.values(lb).filter(v => v === 'done').length;
    });
    return { profile: p, total };
  }).sort((a, b) => b.total - a.total);

  const totalAll = userTotals.reduce((s, u) => s + u.total, 0);
  const maxScore = Math.max(1, userTotals[0]?.total || 1);

  let html = '';

  // Metric cards
  html += `<div class="summary-cards">
    <div class="metric-card">
      <div class="mlabel">Total check-ins</div>
      <div class="mvalue">${totalAll}</div>
      <div class="msub">all members · ${y}</div>
    </div>
    <div class="metric-card">
      <div class="mlabel">Leading member</div>
      <div class="mvalue" style="font-size:1.3rem;padding-top:.4rem">${userTotals[0]?.profile.display_name || '—'}</div>
      <div class="msub">${userTotals[0]?.total || 0} check-ins</div>
    </div>
    <div class="metric-card">
      <div class="mlabel">Members</div>
      <div class="mvalue">${S.profiles.length}</div>
      <div class="msub">${Object.values(S.habits).flat().length} habits total</div>
    </div>
  </div>`;

  // Leaderboard
  html += `<div class="leaderboard">
    <div class="leaderboard-header">🏆 Leaderboard · ${y}</div>`;

  userTotals.forEach((u, i) => {
    const pct    = Math.round(u.total / maxScore * 100);
    const medals = ['🥇','🥈','🥉'];
    const isMe   = u.profile.id === uid;
    const idx    = S.profiles.findIndex(p => p.id === u.profile.id);
    const color  = USER_COLORS[idx % USER_COLORS.length];
    const fill   = USER_FILLS[idx % USER_FILLS.length];

    html += `<div class="lb-row ${isMe ? 'is-me' : ''}">
      <div class="lb-rank">${medals[i] || (i+1)}</div>
      <div class="nav-avatar" style="background:${fill};color:${color};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0">
        ${(u.profile.display_name||u.profile.email||'U').slice(0,2).toUpperCase()}
      </div>
      <div class="lb-name">${escHtml(u.profile.display_name || u.profile.email)}${isMe ? ' <span style="font-size:.7rem;color:var(--ink3)">(you)</span>' : ''}</div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="lb-score">${u.total}</div>
    </div>`;
  });
  html += `</div>`;

  // Monthly breakdown table
  html += `<div class="summary-table-wrap"><table class="summary-table">
    <thead><tr>
      <th style="text-align:left">Member</th>
      ${MONTHS_SHORT.map(m => `<th>${m}</th>`).join('')}
      <th>Year</th>
    </tr></thead><tbody>`;

  S.profiles.forEach((p, i) => {
    const monthTotals = MONTHS.map((_, mi) => {
      let c = 0;
      (S.habits[p.id] || []).forEach(h => {
        const lb = (S.logs[p.id] || {})[h.id] || {};
        const prefix = `${y}-${String(mi+1).padStart(2,'0')}`;
        c += Object.entries(lb).filter(([d, v]) => d.startsWith(prefix) && v === 'done').length;
      });
      return c;
    });
    const yearTotal = monthTotals.reduce((s, v) => s + v, 0);
    const color = USER_COLORS[i % USER_COLORS.length];
    const isMe  = p.id === uid;

    html += `<tr ${isMe ? 'style="background:rgba(43,92,230,.03)"' : ''}>
      <td class="name-col">${escHtml(p.display_name || p.email)}${isMe ? ' <span style="font-size:.7rem;color:var(--ink3)">(you)</span>' : ''}</td>
      ${monthTotals.map(v => `<td>${v || '—'}</td>`).join('')}
      <td style="font-weight:600;color:${color}">${yearTotal}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
}

// ─────────────────────────────────────────
// CELL TOGGLE — cycles empty → skip → done → empty
// ─────────────────────────────────────────
async function toggleCell(habitId, ds) {
  const uid = S.authUser.id;
  if (!S.logs[uid]) S.logs[uid] = {};
  if (!S.logs[uid][habitId]) S.logs[uid][habitId] = {};

  const current = S.logs[uid][habitId][ds];
  // Cycle: null/undefined → skip → done → null
  const next = !current ? 'skip' : current === 'skip' ? 'done' : null;

  // Optimistic update
  if (next) {
    S.logs[uid][habitId][ds] = next;
  } else {
    delete S.logs[uid][habitId][ds];
  }

  // Re-render current view
  const m = parseInt(S.currentView.split(':')[1]);
  renderMonthView(m);

  // Persist to Supabase
  if (next) {
    const { error } = await sb.from('habit_logs').upsert(
      { user_id: uid, habit_id: habitId, log_date: ds, status: next },
      { onConflict: 'habit_id,log_date' }
    );
    if (error) showToast('Failed to save. Try again.');
  } else {
    const { error } = await sb.from('habit_logs').delete()
      .eq('habit_id', habitId).eq('log_date', ds).eq('user_id', uid);
    if (error) showToast('Failed to clear. Try again.');
  }
}

// ─────────────────────────────────────────
// ADD / DELETE HABIT
// ─────────────────────────────────────────
function openAddHabit() {
  openModal('Add habit', 'Name a new habit to track', 'e.g. Morning run', 'Add', async (name) => {
    const { data, error } = await sb.from('habits').insert({
      user_id: S.authUser.id,
      name,
      sort_order: (S.habits[S.authUser.id] || []).length,
    }).select().single();

    if (error) { showToast('Could not add habit.'); return; }

    if (!S.habits[S.authUser.id]) S.habits[S.authUser.id] = [];
    S.habits[S.authUser.id].push(data);
    closeModal();
    const m = parseInt(S.currentView.split(':')[1]);
    renderMonthView(m);
    showToast('Habit added!');
  });
}

async function deleteHabit(habitId) {
  if (!confirm('Remove this habit and all its tracking data?')) return;
  const { error } = await sb.from('habits').delete()
    .eq('id', habitId).eq('user_id', S.authUser.id);
  if (error) { showToast('Could not delete habit.'); return; }

  S.habits[S.authUser.id] = (S.habits[S.authUser.id] || []).filter(h => h.id !== habitId);
  if (S.logs[S.authUser.id]) delete S.logs[S.authUser.id][habitId];

  const m = parseInt(S.currentView.split(':')[1]);
  renderMonthView(m);
  showToast('Habit removed.');
}

// ─────────────────────────────────────────
// EDIT DISPLAY NAME
// ─────────────────────────────────────────
function openEditName() {
  openModal(
    'Edit your name',
    'This is how you appear to other members',
    'Your display name',
    'Save',
    async (name) => {
      const { error } = await sb.from('profiles')
        .update({ display_name: name })
        .eq('id', S.authUser.id);

      if (error) { showToast('Could not update name.'); return; }

      S.profile.display_name = name;
      // Update in profiles array too
      const idx = S.profiles.findIndex(p => p.id === S.authUser.id);
      if (idx >= 0) S.profiles[idx].display_name = name;

      updateSidebarUser();
      closeModal();
      showToast('Name updated!');

      // Re-render current view to reflect name change
      navigateTo(S.currentView);
    },
    S.profile?.display_name || ''
  );
}

// ─────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────
let _modalCb = null;

function openModal(title, desc, placeholder, confirmLabel, callback, prefill = '') {
  document.getElementById('modalTitle').textContent    = title;
  document.getElementById('modalDesc').textContent     = desc;
  document.getElementById('modalInput').placeholder   = placeholder;
  document.getElementById('modalInput').value         = prefill;
  document.getElementById('modalConfirm').textContent = confirmLabel;
  _modalCb = callback;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('modalInput');
    inp.focus();
    inp.select();
  }, 50);
}

document.getElementById('modalConfirm').addEventListener('click', () => {
  const val = document.getElementById('modalInput').value.trim();
  if (!val || !_modalCb) return;
  document.getElementById('modalConfirm').disabled = true;
  Promise.resolve(_modalCb(val)).finally(() => {
    document.getElementById('modalConfirm').disabled = false;
  });
});

document.getElementById('modalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modalConfirm').click();
});

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  _modalCb = null;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function daysInMonth(m, y) { return new Date(y, m + 1, 0).getDate(); }
function isWeekend(m, d, y) { const dow = new Date(y, m, d).getDay(); return dow === 0 || dow === 6; }
function dateStr(y, m, d)   { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function escHtml(s)         { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function signOut() { await sb.auth.signOut(); window.location.href = 'index.html'; }
function toggleSidebar()  { document.getElementById('sidebar').classList.toggle('open'); }

// ─────────────────────────────────────────
// REALTIME
// ─────────────────────────────────────────
sb.channel('habit_logs_rt')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'habit_logs' }, payload => {
    const userId = payload.new?.user_id || payload.old?.user_id;
    if (!userId || userId === S.authUser.id) return; // own changes already applied optimistically
    loadLogs(userId).then(() => {
      if (S.currentView === 'summary') renderSummary();
    });
  }).subscribe();

// ── START ──
init();
</script>
